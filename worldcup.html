<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 世界杯冠军预测</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F5C518;
      --gold-light: #FFE066;
      --gold-dark: #C9A227;
      --bg: #0A0C14;
      --surface: #12151F;
      --surface2: #1A1E2E;
      --text: #F0F2FF;
      --muted: #6B7280;
      --red: #EF4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── starfield ── */
    #stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 90%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 40% 50%, rgba(245,197,24,.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 90% 40%, rgba(245,197,24,.3) 0%, transparent 100%);
    }

    /* ── layout ── */
    .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── hero ── */
    .hero {
      text-align: center;
      padding: 72px 0 56px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(245,197,24,.12);
      border: 1px solid rgba(245,197,24,.3);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 13px; font-weight: 600; letter-spacing: .05em;
      color: var(--gold);
      margin-bottom: 28px;
      opacity: 0;
    }
    .hero-badge span { font-size: 16px; }
    .hero-title {
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -.03em;
      opacity: 0;
    }
    .hero-title em {
      font-style: normal;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      margin-top: 20px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 400;
      opacity: 0;
    }

    /* ── trophy ── */
    .trophy-wrap {
      display: flex; justify-content: center;
      margin: 32px 0 48px;
      opacity: 0;
    }
    .trophy {
      width: 100px; height: 100px;
      background: linear-gradient(145deg, var(--gold-light), var(--gold-dark));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      box-shadow:
        0 0 0 12px rgba(245,197,24,.1),
        0 0 0 24px rgba(245,197,24,.06),
        0 0 60px rgba(245,197,24,.4);
    }

    /* ── stats bar ── */
    .stats-bar {
      display: flex; justify-content: center; gap: 48px;
      margin-bottom: 56px;
      opacity: 0;
    }
    .stat { text-align: center; }
    .stat-num {
      font-size: 32px; font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: .06em; text-transform: uppercase; }

    /* ── section title ── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
      opacity: 0;
    }
    .section-title { font-size: 22px; font-weight: 700; }
    .section-hint { font-size: 13px; color: var(--muted); }

    /* ── cards grid ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px;
      padding: 24px 20px 20px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
      opacity: 0;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(245,197,24,.08) 0%, transparent 65%);
      opacity: 0;
      transition: opacity .3s;
    }
    .card:hover { border-color: rgba(245,197,24,.35); }
    .card:hover::before { opacity: 1; }

    .card.voted {
      border-color: var(--gold);
      background: linear-gradient(160deg, rgba(245,197,24,.1), var(--surface));
    }
    .card.voted::before { opacity: 1; }

    .card-flag { font-size: 48px; line-height: 1; margin-bottom: 14px; }
    .card-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .card-region { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

    .bar-wrap { background: rgba(255,255,255,.07); border-radius: 100px; height: 6px; overflow: hidden; }
    .bar {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      width: 0%;
      transition: width 1.2s cubic-bezier(.16,1,.3,1);
    }
    .card.voted .bar { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }

    .card-bottom {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px;
    }
    .card-pct { font-size: 22px; font-weight: 900; color: var(--gold); }
    .card-votes { font-size: 11px; color: var(--muted); text-align: right; }

    .voted-badge {
      position: absolute; top: 14px; right: 14px;
      background: var(--gold);
      color: #000;
      font-size: 10px; font-weight: 800; letter-spacing: .05em;
      padding: 3px 8px; border-radius: 100px;
      opacity: 0; transform: scale(.6);
      transition: opacity .2s, transform .2s;
    }
    .card.voted .voted-badge { opacity: 1; transform: scale(1); }

    /* ── top 3 podium ── */
    .podium-wrap {
      margin-top: 64px;
      opacity: 0;
    }
    .podium-title { font-size: 22px; font-weight: 700; margin-bottom: 28px; }
    .podium {
      display: flex; align-items: flex-end; justify-content: center; gap: 12px;
    }
    .podium-item { text-align: center; flex: 1; max-width: 200px; }
    .podium-flag { font-size: 36px; margin-bottom: 8px; }
    .podium-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-bar {
      border-radius: 14px 14px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #000;
    }
    .podium-item:nth-child(1) .podium-bar { height: 130px; background: linear-gradient(180deg, #C0C0C0, #9CA3AF); color: #fff; }
    .podium-item:nth-child(2) .podium-bar { height: 180px; background: linear-gradient(180deg, var(--gold-light), var(--gold-dark)); }
    .podium-item:nth-child(3) .podium-bar { height: 100px; background: linear-gradient(180deg, #CD7F32, #92400E); color: #fff; }
    .podium-pct { margin-top: 8px; font-size: 13px; color: var(--muted); }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--gold);
      color: #000; font-weight: 700; font-size: 14px;
      padding: 12px 28px; border-radius: 100px;
      box-shadow: 0 8px 32px rgba(245,197,24,.4);
      z-index: 1000; pointer-events: none; opacity: 0;
    }

    /* ── particles ── */
    .particle {
      position: fixed; width: 10px; height: 10px;
      border-radius: 50%; pointer-events: none; z-index: 999;
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .stats-bar { gap: 24px; }
      .stat-num { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="stars"></div>

  <div class="page">
    <!-- hero -->
    <div class="hero">
      <div class="hero-badge" id="badge"><span>🏆</span> FIFA WORLD CUP 2026</div>
      <h1 class="hero-title" id="title">预测你心中的<br><em>世界杯冠军</em></h1>
      <p class="hero-sub" id="sub">投出你的一票，见证历史时刻</p>
    </div>

    <div class="trophy-wrap" id="trophyWrap">
      <div class="trophy" id="trophy">🏆</div>
    </div>

    <div class="stats-bar" id="statsBar">
      <div class="stat"><div class="stat-num" id="cnt-total">0</div><div class="stat-label">总投票数</div></div>
      <div class="stat"><div class="stat-num">32</div><div class="stat-label">参赛球队</div></div>
      <div class="stat"><div class="stat-num" id="cnt-days">0</div><div class="stat-label">距开幕倒计时</div></div>
    </div>

    <div class="section-head" id="sectionHead">
      <span class="section-title">选择你的冠军</span>
      <span class="section-hint">点击投票 · 可随时更改</span>
    </div>

    <div class="cards" id="cardsGrid"></div>

    <div class="podium-wrap" id="podiumWrap">
      <div class="podium-title">当前热门</div>
      <div class="podium" id="podium"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TEAMS = [
      { flag:'🇧🇷', name:'巴西',     region:'南美洲',   base: 22 },
      { flag:'🇫🇷', name:'法国',     region:'欧洲',     base: 19 },
      { flag:'🇦🇷', name:'阿根廷',   region:'南美洲',   base: 17 },
      { flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', name:'英格兰',   region:'欧洲',     base: 14 },
      { flag:'🇩🇪', name:'德国',     region:'欧洲',     base: 12 },
      { flag:'🇪🇸', name:'西班牙',   region:'欧洲',     base: 11 },
      { flag:'🇵🇹', name:'葡萄牙',   region:'欧洲',     base: 9  },
      { flag:'🇳🇱', name:'荷兰',     region:'欧洲',     base: 7  },
      { flag:'🇧🇪', name:'比利时',   region:'欧洲',     base: 5  },
      { flag:'🇺🇾', name:'乌拉圭',   region:'南美洲',   base: 4  },
      { flag:'🇮🇹', name:'意大利',   region:'欧洲',     base: 4  },
      { flag:'🇺🇸', name:'美国',     region:'北美洲',   base: 3  },
    ];

    let votes = {};
    let userVote = null;
    const totalBase = TEAMS.reduce((s, t) => s + t.base, 0);

    function getVoteCounts() {
      return TEAMS.map((t, i) => {
        const extra = votes[i] || 0;
        return t.base + extra;
      });
    }

    function getTotal() {
      return getVoteCounts().reduce((a, b) => a + b, 0);
    }

    function getPct(i) {
      const total = getTotal();
      return total ? Math.round(getVoteCounts()[i] / total * 100) : 0;
    }

    // ── build cards ──
    const grid = document.getElementById('cardsGrid');
    TEAMS.forEach((team, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `card-${i}`;
      card.innerHTML = `
        <div class="voted-badge">✓ 已投票</div>
        <div class="card-flag">${team.flag}</div>
        <div class="card-name">${team.name}</div>
        <div class="card-region">${team.region}</div>
        <div class="bar-wrap"><div class="bar" id="bar-${i}"></div></div>
        <div class="card-bottom">
          <div class="card-pct" id="pct-${i}">--%</div>
          <div class="card-votes" id="vcnt-${i}"></div>
        </div>
      `;
      card.addEventListener('click', () => handleVote(i));
      grid.appendChild(card);
    });

    function updateUI(animate = true) {
      const total = getTotal();
      document.getElementById('cnt-total').textContent = total.toLocaleString();

      TEAMS.forEach((_, i) => {
        const pct = getPct(i);
        const cnt = getVoteCounts()[i];
        document.getElementById(`pct-${i}`).textContent = pct + '%';
        document.getElementById(`vcnt-${i}`).textContent = cnt.toLocaleString() + ' 票';
        const bar = document.getElementById(`bar-${i}`);
        if (animate) {
          setTimeout(() => { bar.style.width = pct + '%'; }, 100);
        } else {
          bar.style.width = pct + '%';
        }
      });

      // podium top 3
      const ranked = TEAMS.map((t, i) => ({ ...t, i, pct: getPct(i) }))
        .sort((a, b) => b.pct - a.pct).slice(0, 3);
      const podiumEl = document.getElementById('podium');
      const order = [ranked[1], ranked[0], ranked[2]]; // 2nd, 1st, 3rd
      podiumEl.innerHTML = order.map((t, pos) => `
        <div class="podium-item">
          <div class="podium-flag">${t.flag}</div>
          <div class="podium-name">${t.name}</div>
          <div class="podium-bar">${['🥈','🥇','🥉'][pos]}</div>
          <div class="podium-pct">${t.pct}%</div>
        </div>
      `).join('');
    }

    function handleVote(i) {
      const prev = userVote;
      if (userVote !== null) {
        document.getElementById(`card-${userVote}`).classList.remove('voted');
        if (votes[userVote]) votes[userVote]--;
      }
      userVote = i;
      votes[i] = (votes[i] || 0) + 1;
      document.getElementById(`card-${i}`).classList.add('voted');

      // bounce the card
      gsap.fromTo(`#card-${i}`,
        { scale: .96 },
        { scale: 1, duration: .5, ease: 'elastic.out(1.2, .4)' }
      );

      showToast(`为 ${TEAMS[i].name} ${TEAMS[i].flag} 投票成功！`);
      spawnParticles();
      updateUI(true);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      gsap.killTweensOf(t);
      gsap.fromTo(t,
        { y: 80, opacity: 0 },
        { y: 0, opacity: 1, duration: .45, ease: 'back.out(1.7)',
          onComplete() {
            gsap.to(t, { opacity: 0, y: -20, delay: 2, duration: .4, ease: 'power2.in' });
          }
        }
      );
    }

    function spawnParticles() {
      const colors = ['#F5C518','#FFE066','#fff','#FFA500'];
      for (let k = 0; k < 18; k++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = colors[k % colors.length];
        p.style.left = (30 + Math.random() * 40) + 'vw';
        p.style.top = (Math.random() * 60 + 20) + 'vh';
        document.body.appendChild(p);
        gsap.fromTo(p,
          { scale: 0, opacity: 1 },
          {
            scale: Math.random() * 1.5 + .5,
            x: (Math.random() - .5) * 200,
            y: -(Math.random() * 200 + 100),
            opacity: 0,
            duration: Math.random() * .8 + .6,
            ease: 'power2.out',
            onComplete: () => p.remove()
          }
        );
      }
    }

    // ── countdown ──
    const openingDay = new Date('2026-06-11');
    const today = new Date();
    const days = Math.ceil((openingDay - today) / 86400000);
    document.getElementById('cnt-days').textContent = Math.max(0, days);

    // ── INTRO ANIMATION ──
    function runIntro() {
      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

      // badge pops in
      tl.fromTo('#badge',
        { opacity: 0, y: -24, scale: .8 },
        { opacity: 1, y: 0, scale: 1, duration: .6, ease: 'back.out(1.8)' }
      );

      // title each word slams in
      tl.fromTo('#title',
        { opacity: 0, y: 60, skewY: 4 },
        { opacity: 1, y: 0, skewY: 0, duration: .7 },
        '-=.1'
      );

      // sub
      tl.fromTo('#sub',
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: .5 },
        '-=.3'
      );

      // trophy bounces in
      tl.fromTo('#trophyWrap',
        { opacity: 0, scale: 0, rotation: -15 },
        { opacity: 1, scale: 1, rotation: 0, duration: .9, ease: 'elastic.out(1, .5)' },
        '-=.2'
      );

      // trophy pulse glow
      tl.to('#trophy', {
        boxShadow: '0 0 0 12px rgba(245,197,24,.18), 0 0 0 28px rgba(245,197,24,.09), 0 0 80px rgba(245,197,24,.5)',
        duration: .6, yoyo: true, repeat: 1
      }, '-=.4');

      // stats bar
      tl.fromTo('#statsBar',
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: .5 },
        '-=.3'
      );

      // section header
      tl.fromTo('#sectionHead',
        { opacity: 0, x: -20 },
        { opacity: 1, x: 0, duration: .4 },
        '-=.1'
      );

      // cards stagger pop
      tl.fromTo('.card',
        { opacity: 0, y: 50, scale: .88, rotationY: 8 },
        {
          opacity: 1, y: 0, scale: 1, rotationY: 0,
          duration: .55,
          stagger: { amount: .9, from: 'start', ease: 'power2.out' },
          ease: 'back.out(1.5)'
        },
        '-=.1'
      );

      // bars animate after cards
      tl.add(() => updateUI(true), '-=.2');

      // podium
      tl.fromTo('#podiumWrap',
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: .6, ease: 'back.out(1.3)' },
        '-=.1'
      );
    }

    // ── trophy floating ──
    function startTrophyFloat() {
      gsap.to('#trophy', {
        y: -10, rotation: 4,
        duration: 2.2, ease: 'sine.inOut',
        yoyo: true, repeat: -1
      });
    }

    // ── card hover micro ──
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mouseenter', () => {
        gsap.to(card, { y: -4, scale: 1.02, duration: .2, ease: 'power2.out' });
      });
      card.addEventListener('mouseleave', () => {
        gsap.to(card, { y: 0, scale: 1, duration: .3, ease: 'power2.out' });
      });
    });

    // ── init ──
    updateUI(false);
    runIntro();
    setTimeout(startTrophyFloat, 2000);
  </script>
</body>
</html>
